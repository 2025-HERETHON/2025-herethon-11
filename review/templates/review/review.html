{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVE – 리뷰</title>
    <!-- Google Font (로고용) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'review/css/review.css' %}" />
    <script src="{% static 'review/js/review.js' %}" defer></script>
  </head>
  <body>
    <!-- ===== 상단 고정 영역 ===== -->
    <header class="top-bar">
      <div class="status-bar">
        <span id="clock">--:--</span>
        <div class="status-icons">
          <img
            src="{% static 'products/productimg/cellular.png' %}"
            class="icon"
            alt="cellular"
          />
          <img
            src="{% static 'products/productimg/wi-fi.png' %}"
            class="icon"
            alt="wifi"
          />
          <div class="battery">
            <div class="battery-level" id="battery-level"></div>
          </div>
        </div>
      </div>
      <h1 class="page-title">리뷰</h1>
    </header>

    <!-- ===== 본문 ===== -->
    <div class="page-content">
      <section>
        <div class="wear-header">
          <div>착용 상품 <span class="count">{{ worn_product_count }}개</span></div>
          <div class="sort">최신순</div>
        </div>
{% for wp in worn_products %}
  <div class="review-item">
    <img src="{{ wp.product.shop }}" alt="{{ wp.product.title }}" />
    <div class="item-info">
      <div class="title">[{{ wp.product.shop }}] {{ wp.product.title }}</div>
      <div class="opt">{{ wp.color }} · {{ wp.size }}</div>
      <div class="price">{{ wp.product.price }}원</div>
    </div>
    <a href="{% url 'create_review' wp.id %}" class="btn-write">리뷰 작성</a>
  </div>
{% endfor %}

        <div class="review-list" id="review-wrap">

        </div>
      </section>
    </div>

    <!-- ===== 하단 네비 ===== -->
    <nav class="bottom-nav">
      <a href="{% url 'home' %}" class="nav-item" data-icon="home">
        <img
          src="{% static 'products/productimg/home.png' %}"
          alt="home"
          class="nav-icon"
        />
      </a>
      <a href="#" class="nav-item active" data-icon="review">
        <img
          src="{% static 'products/productimg/review_red.png' %}"
          alt="review"
          class="nav-icon"
        />
      </a>
      <a href="{% url 'mypage' %}" class="nav-item" data-icon="user">
        <img
          src="{% static 'products/productimg/user.png' %}"
          alt="mypage"
          class="nav-icon"
        />
      </a>
    </nav>
  </body>
</html>
