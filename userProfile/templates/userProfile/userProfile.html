{% load static %}
<h1>{{ user_name }}님의 찜한 상품</h1>

{% if liked_items %}
  {% for product in liked_items %}
    <div>
      <img src="{{ product.image_url }}" alt="{{ product.title }}" width="100">
      <p>{{ product.title }} - {{ product.price }}원</p>
    </div>
  {% endfor %}
{% else %}
  <p>찜한 상품이 없습니다.</p>
{% endif %}
