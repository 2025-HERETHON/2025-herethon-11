{% load static %}
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의서랍 – 착용 제품</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'userProfile/css/fit_result.css' %}" />
    <script src="{% static 'userProfile/js/fit_result.js' %}" defer></script>
  </head>
  <body>
    <!-- 상단 -->
    <header class="top-bar">
      <div class="status-bar">
        <span id="clock">--:--</span>
        <div class="status-icons">
          <img
            src="{% static 'products/productimg/cellular.png' %}"
            class="icon"
          />
          <img
            src="{% static 'products/productimg/wi-fi.png' %}"
            class="icon"
          />
          <div class="battery">
            <div class="battery-level" id="battery-level"></div>
          </div>
        </div>
      </div>
      <h1 class="page-title">나의서랍</h1>

      <div class="profile-box">
        {% if profile_image %}
            <img src="{{ profile_image.url }}" alt="프로필" />
        {% else %}
            <img src="{% static 'account/img/profile.png' %}" alt="기본 프로필 이미지" />
        {% endif %}
        <div class="profile-info">
          <div class="profile-container">
            <h2>{{ nickname }}</h2>
            <div class="logout" onclick="showLogout()">
              로그아웃
              <img
                src="{% static 'account/img/toggler.png' %}"
                alt=""
              />
            </div>
          </div>
          <button onclick="showProfileEdit()">프로필 수정</button>
          <button onclick="location.href='{% url 'body_input' %}'">
            신체 사이즈 입력
          </button>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="location.href='fit_result.html'">
          착용 제품
        </div>
        <div class="tab" onclick="location.href='wishlist.html'">찜 목록</div>
      </div>
    </header>

    <!-- 본문 -->
    <div class="page-content">
      <section>
        <div class="wear-header">
          <div>전체 상품</div>
          <div class="count-container">
            <span class="count">상품 35개</span>
            <div class="sort">최신순</div>
          </div>
        </div>
        <div class="review-list" id="review-wrap"><!-- JS 카드 삽입 --></div>
      </section>
    </div>

    <!-- 하단 네비 -->
    <nav class="bottom-nav">
      <a href="{% url 'home' %}" class="nav-item">
        <img src="{% static 'products/productimg/home.png' %}" />
      </a>
      <a href="{% url 'list_review' %}" class="nav-item">
        <img src="{% static 'products/productimg/review.png' %}" />
      </a>
      <a href="#" class="nav-item active">
        <img src="{% static 'products/productimg/user.png' %}" />
      </a>
    </nav>

    <!-- 로그아웃 모달 -->
    <div class="modal" id="logoutModal">
      <div class="modal-content">
        <p>로그아웃 하시겠어요?</p>
        <div class="modal-buttons">
          <button class="cancel" onclick="hideLogout()">취소</button>
          <button class="confirm" onclick="location.href='{% url 'account_logout' %}'">
            로그아웃
          </button>
        </div>
      </div>
    </div>

    <!-- [1] 모달 바깥: 실제 현재 프로필 -->
    <img
      id="currentProfile"
      src="{% static 'products/productimg/profile.png' %}"
      alt="프로필"
      style="width: 84px; height: 84px; border-radius: 50%"
    />

    <!-- [2] 프로필 수정 모달 -->
    <form method="POST" action="{% url 'update-profile' %}" enctype="multipart/form-data">
    {% csrf_token %}
      <div class="profile-modal" id="profileModal">
      <div class="profile-content">
        <div class="profile-edit">
          <div class="profile-title">프로필 수정</div>
          <div class="profile-img">
            <img
              src="{% static 'account/img/x.png' %}"
              alt="닫기"
              onclick="hideProfileEdit()"
            />
          </div>
        </div>

        <!-- 이미지 미리보기 -->
        <div class="profile-image">
          <label for="upload">
            {% if profile_image %}
            <img
              id="previewImg"
              src="{{ profile_image.url }}"
              alt="프로필"
            />
            {% else %}
            <img id="previewImg" src="{% static 'account/img/profile.png' %}" alt="기본 프로필 이미지" />
            {% endif %}
          </label>
          <input
            type="file"
            id="upload"
            name="profile_image"
            accept="image/*"
            onchange="updateProfileImg(event)"
            style="display: none"
          />
        </div>

        <div class="nickname">
          <div>닉네임</div>
          <input
            type="text"
            id="nicknameInput"
            name="nickname"
            value="{{ nickname }}"
            maxlength="10"
            oninput="updateCharCount()"
            class="nickname-input"
          />
          <div><span id="charCount">0</span> / 10</div>
        </div>

        <button class="confirm" onclick="saveProfile()">수정 내용 저장</button>
      </div>
    </div>
    </form>
  </body>
</html>
