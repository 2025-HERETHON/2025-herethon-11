<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의서랍 – 착용 제품</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --eve-main: #b40103;
        --grey-bg: #f5f5f5;
        --text-main: #000;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        max-width: 390px;
        width: 100%;
        margin: 0 auto;
        overflow-x: hidden;
      }
      body {
        font-family: "Pretendard", sans-serif;
        background: #fff;
        overflow-y: auto;
      }

      /* 상단 고정바 */
      .top-bar {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 390px;
        background: #fff;
        border-bottom: 1px solid #ddd;
        z-index: 1000;
      }
      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 15px 0;
        font: 600 14px/1 Pretendard;
      }
      .status-icons {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .battery {
        position: relative;
        width: 24px;
        height: 12px;
        border: 2px solid #000;
        border-radius: 2px;
      }
      .battery::after {
        content: "";
        position: absolute;
        right: -5px;
        top: 3px;
        width: 3px;
        height: 6px;
        background: #000;
        border-radius: 1px;
      }
      .battery-level {
        height: 100%;
        background: #000;
        width: 50%;
      }

      .page-title {
        text-align: center;
        font: 700 17px/44px Pretendard;
        margin: 20px 0 8px;
      }

      /* 프로필 박스 */
      .profile-box {
        display: flex;
        align-items: center;
        padding: 0 15px;
        margin-bottom: 10px;
      }
      .profile-box img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin-right: 15px;
      }
      .profile-info {
        flex: 1;
      }
      .profile-container {
        display: flex;
        justify-content: space-between;
      }
      .profile-info h2 {
        font-size: 16px;
        margin-bottom: 6px;
      }
      .profile-info button {
        font-size: 12px;
        padding: 4px 8px;
        margin-right: 5px;
        border: 1px solid #b40103;
        border-radius: 5px;
        background: #fff;
        cursor: pointer;
      }
      .logout {
        font-size: 13px;
        color: gray;
        cursor: pointer;
      }
      .logout img {
        width: 4.5px;
        height: 9px;
      }

      /* 탭 */
      .tabs {
        display: flex;
        border-bottom: 1px solid #eee;
        margin-top: 10px;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 12px 0;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
      }
      .tab.active {
        border-bottom: none;
        display: flex;
        justify-content: center;
        position: relative;
      }
      .tab.active::before {
        content: "";
        position: absolute;
        bottom: 0;
        width: 66px;
        border-bottom: 2px solid #000;
        left: 50%;
        transform: translateX(-50%);
      }

      /* 본문 */
      .page-content {
        padding: 220px 0 90px;
      }
      .wear-header {
        padding: 0 15px 10px;
        font-size: 14px;
        font-weight: 600;
        padding-top: 10px;
      }
      .count-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-direction: row;
        margin-top: 2px;
      }
      .wear-header .count {
        color: #949494;
        font-weight: 400;
      }
      .wear-header .sort {
        color: #949494;
        font-weight: 400;
      }

      .review-list {
        padding: 0 15px;
      }
      .review-item {
        display: flex;
        gap: 12px;
        padding: 14px 0;
        border-bottom: 1px solid #eee;
        position: relative;
      }
      .review-item img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 8px;
      }
      .item-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-size: 12px;
      }
      .item-info .title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
      }
      .item-info .opt {
        color: #666;
      }
      .item-info .price {
        font-size: 14px;
        font-weight: 600;
      }
      .btn-write {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        color: #949494;
        text-decoration: none;
      }

      /* 하단 네비 */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 390px;
        height: 70px;
        background: #fff;
        border-top: 1px solid #ddd;
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 12px;
        color: #000;
        text-decoration: none;
      }
      .nav-item img {
        width: 40px;
        height: 40px;
        margin-bottom: 4px;
        object-fit: contain;
      }
      .nav-item.active {
        color: var(--eve-main);
      }
    </style>
  </head>
  <body>
    <!-- 상단 -->
    <header class="top-bar">
      <div class="status-bar">
        <span id="clock">--:--</span>
        <div class="status-icons">
          <img
            src="../../static/products/productimg/cellular.png"
            class="icon"
          />
          <img src="../../static/products/productimg/wi-fi.png" class="icon" />
          <div class="battery">
            <div class="battery-level" id="battery-level"></div>
          </div>
        </div>
      </div>
      <h1 class="page-title">나의서랍</h1>

      <div class="profile-box">
        <img src="../../static/products/productimg/profile.png" alt="프로필" />
        <div class="profile-info">
          <div class="profile-container">
            <h2>김멋사</h2>
            <div class="logout" onclick="showLogout()">
              로그아웃
              <img src="../../static/products/productimg/toggler.png" alt="" />
            </div>
          </div>
          <button>프로필 수정</button>
          <button onclick="location.href='body_input.html'">
            신체 사이즈 입력
          </button>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="location.href='fit_result.html'">
          착용 제품
        </div>
        <div class="tab">찜 목록</div>
      </div>
    </header>

    <!-- 본문 -->
    <div class="page-content">
      <section>
        <div class="wear-header">
          <div>전체 상품</div>
          <div class="count-container">
            <span class="count">상품 35개</span>
            <div class="sort">최신순</div>
          </div>
        </div>
        <div class="review-list" id="review-wrap"><!-- JS 카드 삽입 --></div>
      </section>
    </div>

    <!-- 하단 네비 -->
    <nav class="bottom-nav">
      <a href="product.html" class="nav-item"
        ><img src="../../static/products/productimg/home.png"
      /></a>
      <a href="review.html" class="nav-item"
        ><img src="../../static/products/productimg/review.png"
      /></a>
      <a href="fit_result.html" class="nav-item active"
        ><img src="../../static/products/productimg/user.png"
      /></a>
    </nav>

    <script>
      // 시계
      function updateClock() {
        const d = new Date();
        document.getElementById("clock").textContent = d
          .toTimeString()
          .slice(0, 5);
      }
      updateClock();
      setInterval(updateClock, 60000);

      // 더미 데이터
      const wornProducts = Array(6).fill({
        img: "products/productimg/sample1.jpg",
        brand: "더잠",
        title: "이지핏 스퀘어 브라탑 · 팬티 세트",
        color: "블랙",
        size: "M",
        price: 23000,
      });

      const makeCard = (p) => `
        <div class="review-item">
          <img src="${p.img}" alt="${p.title}" />
          <div class="item-info">
            <div class="title">[${p.brand}] ${p.title}</div>
            <div class="opt">${p.color} · ${p.size}</div>
            <div class="price">${p.price.toLocaleString()}원</div>
          </div>
          <a href="#" class="btn-write">내 리뷰 보기</a>
        </div>`;
      document.getElementById("review-wrap").innerHTML = wornProducts
        .map(makeCard)
        .join("");
    </script>
  </body>
</html>
