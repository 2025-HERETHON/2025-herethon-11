{% load static %}
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>신체 사이즈</title>
    <link rel="stylesheet" href="{% static 'userProfile/body_input.css' %}" />
    <script src="{% static 'userProfile/body_input.js' %}" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="toggle-container">
        <header>
          <div class="bar">
            <div class="title">신체 사이즈</div>
            <img
              src="{% static 'account/img/x.png' %}"
              alt="exit"
              onclick="location.href='fit_result.html'"
            />
          </div>
        </header>
        <div class="toggle-wrapper">
          <span id="privacyLabel" style="font-size: 13px">비공개</span>
          <label class="switch">
            <input type="checkbox" id="privacyToggle" />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="section">
        <strong>가슴</strong>
        <div class="bust-scroll-row">
          <div class="bust-item">
            <div class="scroll-label">윗가슴 둘레</div>
            <div class="scroll-wrapper">
              <ul class="select-list" id="topBust"></ul>
              <div class="picker-border"></div>
            </div>
          </div>
          <div class="bust-item">
            <div class="scroll-label">밑가슴 둘레</div>
            <div class="scroll-wrapper">
              <ul class="select-list" id="underBust"></ul>
              <div class="picker-border"></div>
            </div>
          </div>
        </div>
        <div class="measure-panel">
          <div class="result-box" id="cupResult"></div>
          <button
            class="measure-btn"
            id="cupMeasureBtn"
            onclick="calculateCup(this)"
          >
            사이즈 측정
          </button>
        </div>
        <div class="input-toggle" onclick="toggleManualInput('cup')">
          컵 사이즈 직접 입력
          <img
            src="{% static 'account/img/toggle1.png' %}"
            alt=""
            id="cupArrow"
          />
        </div>
        <div class="manual-input-wrapper">
          <div class="manual-input" id="manualCupInput" style="display: none">
            <input
              type="text"
              placeholder="컵 사이즈를 입력해 주세요 ex) 75B"
            />
          </div>
        </div>
      </div>

      <hr />

      <div class="section">
        <strong>골반</strong>
        <div class="input-group">
          <div class="input-box">
            허리 둘레:
            <input type="number" id="waistInput" placeholder="0" /> cm
          </div>
          <div class="input-box">
            힙 둘레: <input type="number" id="hipInput" placeholder="0" /> cm
          </div>
        </div>
        <div class="measure-panel" style="align-items: flex-end">
          <div class="result-box" id="hipResult"></div>
          <button
            class="measure-btn"
            id="hipMeasureBtn"
            onclick="calculateHip(this)"
          >
            사이즈 측정
          </button>
        </div>
        <div class="input-toggle" onclick="toggleManualInput('hip')">
          골반 사이즈 직접 입력
          <img
            src="{% static 'account/img/toggle1.png' %}"
            alt=""
            id="hipArrow"
          />
        </div>
        <div class="manual-input-wrapper">
          <div class="manual-input" id="manualHipInput" style="display: none">
            <input type="text" placeholder="골반 사이즈를 입력해 주세요" />
          </div>
        </div>
      </div>

      <hr />

      <div class="section">
        <strong>키 / 몸무게</strong>
        <div class="input-group">
          <div class="input-box">
            키: <input type="number" placeholder="0" id="height" /> cm
          </div>
          <div class="input-box">
            몸무게: <input type="number" placeholder="0" id="weight" /> kg
          </div>
        </div>
      </div>
    </div>

    <div class="btn-section">
      <button class="btn reset" onclick="resetAll()">초기화</button>
      <button class="btn save" onclick="saveData()">저장하기</button>
    </div>

    {% comment %} 팝업창 {% endcomment %}
    <div id="hipAlertOverlay" style="display: none">
      <div class="hip-alert-box">
        힙 둘레는 82보다 작거나 117보다<br />클 수 없습니다. 다시 입력해 주세요.
      </div>
    </div>
  </body>
</html>
