{% load socialaccount %} {% load static %}
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVE 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&family=Prata&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css"
    />
    <link rel="stylesheet" href="{% static 'account/css/login.css' %}" />
    <script src="{% static 'account/js/login.js' %}" defer></script>
  </head>
  <body>
    <div class="login-container">
      <div class="title">EVE</div>
      <div class="subtitle">In Her Name, I Wear My Body</div>

      <form action="{% provider_login_url 'google' %}" method="post">
        {% csrf_token %}
        <button class="login-button google">
          <div class="btn">
            <img
              src="{% static 'account/img/google.png' %}"
              alt="Google Logo"
            />
            <span>Google로 로그인</span>
          </div>
        </button>
      </form>

      <form action="{% provider_login_url 'kakao' %}" method="post">
        {% csrf_token %}
        <button class="login-button kakao">
          <div class="btn">
            <img src="{% static 'account/img/kakao.png' %}" alt="Kakao Logo" />
            <span>KaKao로 로그인</span>
          </div>
        </button>
      </form>
    </div>

    <!-- <script>
      document.querySelector(".google").addEventListener("click", () => {
        alert("Google 로그인은 현재 준비 중입니다.");
      });

      document.querySelector(".kakao").addEventListener("click", () => {
        alert("Kakao 로그인은 현재 준비 중입니다.");
      });
    </script> -->
  </body>
</html>
