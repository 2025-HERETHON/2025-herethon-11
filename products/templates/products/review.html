<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVE – 리뷰</title>
    <!-- Google Font (로고용) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../static/products/review.css" />
    <script src="../../static/products/review.js" defer></script>
  </head>
  <body>
    <!-- ===== 상단 고정 영역 ===== -->
    <header class="top-bar">
      <div class="status-bar">
        <span id="clock">--:--</span>
        <div class="status-icons">
          <img
            src="../../static/products/productimg/cellular.png"
            class="icon"
            alt="cellular"
          />
          <img
            src="../../static/products/productimg/wi-fi.png"
            class="icon"
            alt="wifi"
          />
          <div class="battery">
            <div class="battery-level" id="battery-level"></div>
          </div>
        </div>
      </div>
      <h1 class="page-title">리뷰</h1>
    </header>

    <!-- ===== 본문 ===== -->
    <div class="page-content">
      <section>
        <div class="wear-header">
          <div>착용 상품 <span class="count">상품 35개</span></div>
          <div class="sort">최신순</div>
        </div>

        <div class="review-list" id="review-wrap"><!-- JS로 카드 삽입 --></div>
      </section>
    </div>

    <!-- ===== 하단 네비 ===== -->
    <nav class="bottom-nav">
      <a href="product.html" class="nav-item" data-icon="home">
        <img
          src="../../static/products/productimg/home.png"
          alt="home"
          class="nav-icon"
        />
      </a>
      <a href="#" class="nav-item active" data-icon="review">
        <img
          src="../../static/products/productimg/review_red.png"
          alt="review"
          class="nav-icon"
        />
      </a>
      <a href="mypage.html" class="nav-item" data-icon="user">
        <img
          src="../../static/products/productimg/user.png"
          alt="mypage"
          class="nav-icon"
        />
      </a>
    </nav>
  </body>
</html>
