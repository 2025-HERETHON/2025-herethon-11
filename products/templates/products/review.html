<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVE – 리뷰</title>
    <!-- Google Font (로고용) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
      rel="stylesheet"
    />

    <!-- ================= 공통 스타일 ================= -->
    <style>
      :root {
        --eve-main: #b40103;
        --grey-bg: #f5f5f5;
        --text-main: #000;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        /* 모바일 해상도 고정 */

        max-width: 390px;
        width: 100%;
        margin-left: auto;
        margin-right: auto;
        overflow-x: hidden;
      }
      body {
        font-family: "Pretendard", sans-serif;
        background: #fff;
        overflow-y: auto;
      }

      /* ───────────── 상단 고정 바 ───────────── */
      .top-bar {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 390px;
        background: #fff;
        border-bottom: 1px solid #ddd;
        z-index: 1000;
      }
      /* 상태바 (시간 · 아이콘) */
      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 15px 0;
        font: 600 14px/1 Pretendard;
      }
      .status-icons {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .battery {
        position: relative;
        width: 24px;
        height: 12px;
        border: 2px solid #000;
        border-radius: 2px;
      }
      .battery::after {
        content: "";
        position: absolute;
        right: -5px;
        top: 3px;
        width: 3px;
        height: 6px;
        background: #000;
        border-radius: 1px;
      }
      .battery-level {
        height: 100%;
        background: #000;
        width: 50%;
      }
      /* 페이지 제목 */
      .page-title {
        text-align: center;
        font: 700 17px/44px Pretendard;
        border-top: 6px solid transparent; /* 상태바 높이 여백 */
        margin: 25px 0 8px; /* ⬅️ 위 14px, 아래 8px → 상단바와 제목 간 넉넉한 간격 */
      }

      /* ───────────── 본문 ───────────── */
      .page-content {
        padding: 130px 0 90px; /* top-bar + bottom-nav 공간 확보 */
      }
      /* 섹션 헤더 */
      .wear-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 15px 10px;
        font-size: 14px;
        font-weight: 600;
      }
      .wear-header .count {
        color: #949494;
        font-weight: 400;
        margin-left: 6px;
      }
      .wear-header .sort {
        color: #949494;
        font-weight: 400;
        font-size: 13px;
      }
      /* 리스트 */
      .review-list {
        padding: 0 15px;
      }
      .review-item {
        position: relative;
        display: flex;
        gap: 12px;
        padding: 14px 0;
        border-bottom: 1px solid #eee;
      }
      .review-item img {
        flex-shrink: 0;
        width: 80px;
        height: 80px;
        border-radius: 8px;
        object-fit: cover;
      }
      .item-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-size: 12px;
      }
      .item-info .title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
      }
      .item-info .opt {
        color: #666;
      }
      .item-info .price {
        font-size: 14px;
        font-weight: 600;
      }
      .btn-write {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        color: #949494;
        text-decoration: none;
      }

      /* ───────────── 하단 네비 (product.html과 동일) ───────────── */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 390px;
        height: 70px;
        background: #fff;
        border-top: 1px solid #ddd;
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 12px;
        color: #000;
        text-decoration: none;
      }
      .nav-item img {
        width: 40px;
        height: 40px;
        margin-bottom: 4px;
        object-fit: contain;
      }
      .nav-item.active {
        color: var(--eve-main);
      }
      .nav-icon {
        width: 40px;
        height: 40px;
        object-fit: contain;
        margin-bottom: 4px;
        transition: transform 0.2s;
      }
      .nav-item.active .nav-icon {
        transform: scale(1.1); /* ⬅️ 경쾌한 클릭 효과 */
      }
      .wear-header .count {
        display: block; /* 인라인 → 블록으로 바꿔서 줄바꿈! */
        margin-top: 2px; /* 간격 살짝 줄게요(원하면 값 조정!) */
      }
    </style>
  </head>
  <body>
    <!-- ===== 상단 고정 영역 ===== -->
    <header class="top-bar">
      <div class="status-bar">
        <span id="clock">--:--</span>
        <div class="status-icons">
          <img
            src="../../static/products/productimg/cellular.png"
            class="icon"
            alt="cellular"
          />
          <img
            src="../../static/products/productimg/wi-fi.png"
            class="icon"
            alt="wifi"
          />
          <div class="battery">
            <div class="battery-level" id="battery-level"></div>
          </div>
        </div>
      </div>
      <h1 class="page-title">리뷰</h1>
    </header>

    <!-- ===== 본문 ===== -->
    <div class="page-content">
      <section>
        <div class="wear-header">
          <div>착용 상품 <span class="count">상품 35개</span></div>
          <div class="sort">최신순</div>
        </div>

        <div class="review-list" id="review-wrap"><!-- JS로 카드 삽입 --></div>
      </section>
    </div>

    <!-- ===== 하단 네비 ===== -->
    <nav class="bottom-nav">
      <a href="product.html" class="nav-item" data-icon="home">
        <img
          src="../../static/products/productimg/home.png"
          alt="home"
          class="nav-icon"
        />
      </a>
      <a href="#" class="nav-item active" data-icon="review">
        <img
          src="../../static/products/productimg/review_red.png"
          alt="review"
          class="nav-icon"
        />
      </a>
      <a href="mypage.html" class="nav-item" data-icon="user">
        <img
          src="../../static/products/productimg/user.png"
          alt="mypage"
          class="nav-icon"
        />
      </a>
    </nav>

    <!-- ================= 스크립트 ================= -->
    <script>
      /* 시계 */
      function updateClock() {
        const d = new Date();
        document.getElementById("clock").textContent = d
          .toTimeString()
          .slice(0, 5);
      }
      updateClock();
      setInterval(updateClock, 60000);

      /* 더미 데이터로 카드 생성 (원한다면 AJAX로 대체) */
      const wornProducts = [
        {
          img: "products/productimg/sample1.jpg",
          brand: "더잠",
          title: "이지핏 스퀘어 브라탑 · 팬티 세트",
          color: "블랙",
          size: "M",
          price: 23000,
        },
        {
          img: "products/productimg/sample1.jpg",
          brand: "더잠",
          title: "이지핏 스퀘어 브라탑 · 팬티 세트",
          color: "블랙",
          size: "M",
          price: 23000,
        },
        {
          img: "products/productimg/sample1.jpg",
          brand: "더잠",
          title: "이지핏 스퀘어 브라탑 · 팬티 세트",
          color: "블랙",
          size: "M",
          price: 23000,
        },
        {
          img: "products/productimg/sample1.jpg",
          brand: "더잠",
          title: "이지핏 스퀘어 브라탑 · 팬티 세트",
          color: "블랙",
          size: "M",
          price: 23000,
        },
        {
          img: "products/productimg/sample1.jpg",
          brand: "더잠",
          title: "이지핏 스퀘어 브라탑 · 팬티 세트",
          color: "블랙",
          size: "M",
          price: 23000,
        },
        {
          img: "products/productimg/sample1.jpg",
          brand: "더잠",
          title: "이지핏 스퀘어 브라탑 · 팬티 세트",
          color: "블랙",
          size: "M",
          price: 23000,
        },
      ];
      const makeCard = (p) => `
        <div class="review-item">
          <img src="${p.img}" alt="${p.title}" />
          <div class="item-info">
            <div class="title">[${p.brand}] ${p.title}</div>
            <div class="opt">${p.color} · ${p.size}</div>
            <div class="price">${p.price.toLocaleString()}원</div>
          </div>
          <a href="#" class="btn-write">리뷰 작성</a>
        </div>`;
      document.getElementById("review-wrap").innerHTML = wornProducts
        .map(makeCard)
        .join("");

      /* === 바텀 네비게이션 (product.html 동일 로직) === */
      const STATIC_PATH = "../../static/products/productimg/";
      const navItems = document.querySelectorAll(".bottom-nav .nav-item");
      navItems.forEach((item) => {
        item.addEventListener("click", (e) => {
          e.preventDefault();
          /* 1. 모든 아이콘 & 글자 초기화 */
          navItems.forEach((n) => {
            const base = n.dataset.icon;
            n.classList.remove("active");
            n.querySelector("img").src = STATIC_PATH + base + ".png";
          });
          /* 2. 선택된 아이콘만 빨간색 + 살짝 확대 */
          const base = item.dataset.icon;
          item.classList.add("active");
          item.querySelector("img").src = STATIC_PATH + base + "_red.png";

          /* 3. 페이지 이동 or 기능 */
          if (base === "home") {
            window.location.href = "product.html"; // 홈
          } else if (base === "user") {
            window.location.href = "mypage.html"; // 마이페이지
          } else {
            // 리뷰 페이지 → 현재 페이지, 아무 동작 없음
          }
        });
      });
    </script>
  </body>
</html>
