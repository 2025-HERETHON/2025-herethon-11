{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>EVE – 홈</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'products/css/search.css' %}" />
    <script src="{% static 'products/js/search.js' %}" defer></script>
  </head>
  <body>
    <!-- ============================== 본문 ============================== -->
    <div class="page-content">
      {% include './header.html' %}

      <h1 class="logo">EVE</h1>

      <form
        action="{% url 'product_search' %}"
        method="get"
        class="search-wrap"
      >
        <input
          type="text"
          name="q"
          value="{{ request.GET.q|default_if_none:'' }}"
          placeholder="원하는 상품을 검색하세요"
        />
        <button type="submit" class="search-icon" aria-label="search"></button>
      </form>

      <button class="btn-rec">추천받기</button>

      <div class="recommend-grid" id="rec-wrap">
        {% for product in products %}
        <div
          class="item-card"
          onclick="location.href='{% url 'product_detail' product.id %}?from=search&q={{ request.GET.q|urlencode }}'"
        >
          <div class="item-img-wrap">
            <img src="{{ product.thumbnail_url }}" alt="{{ product.title }}" />
            <button
              type="button"
              class="heart {% if user in product.liked_users.all %}liked{% endif %}"
              data-product-id="{{ product.id }}"
              onclick="toggleLike(event)"
            ></button>

            <span
              class="wear"
              data-id="{{ product.id }}"
              data-colors="{{ product.color }}"
              data-sizes="{{ product.size }}"
              onclick="event.stopPropagation()"
            ></span>
          </div>
          <div class="item-info">
            <div class="item-price">{{ product.price }}원</div>
            <div class="item-brand">{{ product.shop }}</div>
            <div class="item-desc">{{ product.title }}</div>
          </div>
        </div>
        {% empty %}
        <p style="padding: 0 15px">추천 상품이 없습니다.</p>
        {% endfor %}
      </div>

      <!-- 하단 네비 -->
      <nav class="bottom-nav">
        <!-- ① data-icon 속성 추가 ② home만 빨간 아이콘로 시작 -->
        <a href="#" class="nav-item active" data-icon="home" data-url="/">
          <img
            src="{% static 'products/productimg/home_red.png' %}"
            alt="home"
            class="nav-icon"
          />
        </a>
        <a
          href="{% url 'list_review' %}"
          class="nav-item"
          data-icon="review"
          data-url="{% url 'list_review' %}"
        >
          <img
            src="{% static 'products/productimg/review.png' %}"
            alt="review"
            class="nav-icon"
          />
        </a>
        <a
          href="{% url 'mypage' %}"
          class="nav-item"
          data-icon="user"
          data-url="{% url 'mypage' %}"
        >
          <img
            src="{% static 'products/productimg/user.png' %}"
            alt="mypage"
            class="nav-icon"
          />
        </a>
      </nav>
    </div>

    <!-- ============================== 모달 ============================== -->
    <section id="rec-modal" class="rec-modal">
      <div class="modal-backdrop"></div>
      <article class="modal-sheet flex-col">
        <!-- 상태바 (모달용) -->
        {% include './header.html' %}

        <header class="modal-header">
          <h2 class="modal-title">추천받기</h2>
          <button class="modal-close" aria-label="close">&times;</button>
        </header>

        <!-- 체형 버튼 -->
        <section class="block">
          <button id="btn-body" class="tag-btn outline">체형 불러오기</button>
          <div id="body-info" class="body-info-box"></div>
        </section>

        <!-- 가격 -->
        <section id="price-sec" class="block">
          <h3 class="block-title">가격</h3>
          <div class="price-inputs">
            <div class="price-field">
              <input id="price-min" placeholder="0" /><span class="unit"
                >원</span
              >
            </div>
            <span class="dash">-</span>
            <div class="price-field">
              <input id="price-max" placeholder="500,000" /><span class="unit"
                >원</span
              >
            </div>
          </div>
          <div id="price-slider">
            <div class="track"></div>
            <div id="handle-min" class="handle"></div>
            <div id="handle-max" class="handle"></div>
          </div>
        </section>

        <!-- 색상 -->
        <section id="color-sec" class="filter block">
          <h3 class="block-title">색상</h3>
          <div id="color-wrap" class="chips">
            <!-- 기본 6 -->
            <button class="chip" data-value="블랙">
              <span class="circle" style="background: #000"></span>블랙
            </button>
            <button class="chip" data-value="화이트">
              <span class="circle border"></span>화이트
            </button>
            <button class="chip" data-value="브라운">
              <span class="circle" style="background: #7a5c4a"></span>브라운
            </button>
            <button class="chip" data-value="그레이">
              <span class="circle" style="background: #b3b3b3"></span>그레이
            </button>
            <button class="chip" data-value="베이지">
              <span class="circle" style="background: #f3e0c9"></span>베이지
            </button>
            <button class="chip" data-value="카키">
              <span class="circle" style="background: #40625c"></span>카키
            </button>
            <!-- 추가 색상 (more) -->
            <button class="chip more" data-value="라이트핑크">
              <span class="circle" style="background: #fadce5"></span>라이트핑크
            </button>
            <button class="chip more" data-value="딥핑크">
              <span class="circle" style="background: #d96a7b"></span>딥핑크
            </button>
            <button class="chip more" data-value="라일락">
              <span class="circle" style="background: #d8c7e3"></span>라일락
            </button>
            <button class="chip more" data-value="레드">
              <span class="circle" style="background: #b22222"></span>레드
            </button>
            <button class="chip more" data-value="버건디">
              <span class="circle" style="background: #6e1e2a"></span>버건디
            </button>
            <button class="chip more" data-value="코랄">
              <span class="circle" style="background: #ff8f7e"></span>코랄
            </button>
            <button class="chip more" data-value="라이트 옐로우">
              <span class="circle" style="background: #fff7c2"></span>라이트
              옐로우
            </button>
            <button class="chip more" data-value="민트">
              <span class="circle" style="background: #d4f2db"></span>민트
            </button>
            <button class="chip more" data-value="올리브">
              <span class="circle" style="background: #a2a77f"></span>올리브
            </button>
            <button class="chip more" data-value="라이트 블루">
              <span class="circle" style="background: #bfd9ff"></span>라이트
              블루
            </button>
            <button class="chip more" data-value="네이비">
              <span class="circle" style="background: #2c3e50"></span>네이비
            </button>
            <button class="chip more" data-value="차콜">
              <span class="circle" style="background: #444"></span>차콜
            </button>
            <button class="chip more" data-value="아이보리">
              <span class="circle" style="background: #f8f4ea"></span>아이보리
            </button>
            <button class="chip more" data-value="블루그린">
              <span class="circle" style="background: #3d6b6b"></span>블루그린
            </button>
            <button class="chip more" data-value="etc">
              <span
                class="circle"
                style="background: #fff; border: 1px solid #ccc"
              ></span
              >기타
            </button>
          </div>
          <button id="color-toggle" class="toggle">색상 전체보기</button>
        </section>

        <!-- 소재 -->
        <section id="mat-sec" class="filter block">
          <h3 class="block-title">소재</h3>
          <div id="mat-wrap" class="chips">
            <button class="chip" data-material="모달">모달</button>
            <button class="chip" data-material="면">면</button>
            <button class="chip" data-material="비스코스">비스코스</button>
            <button class="chip" data-material="폴리에스테르">
              폴리에스테르
            </button>
            <button class="chip" data-material="텐셀">텐셀</button>
            <button class="chip" data-material="합성섬유">합성섬유</button>
            <button class="chip" data-material="오가닉 코튼">
              오가닉 코튼
            </button>

            <!-- more -->
            <button class="chip more" data-material="무봉제 가공">
              무봉제 가공
            </button>
            <button class="chip more" data-material="레이온">레이온</button>
            <button class="chip more" data-material="스판덱스">스판덱스</button>
            <button class="chip more" data-material="실크">실크</button>
            <button class="chip more" data-material="폴리우레탄">
              폴리우레탄
            </button>
            <button class="chip more" data-material="나일론">나일론</button>
            <button class="chip more" data-material="파워넷">파워넷</button>
            <button class="chip more" data-material="마이크로 화이버">
              마이크로 화이버
            </button>
            <button class="chip more" data-material="기타">기타</button>
          </div>
          <button id="mat-toggle" class="toggle">소재 전체보기</button>
        </section>

        <!-- 타입 -->

        <section id="type-sec" class="filter block">
          <h3 class="block-title">타입</h3>
          <div id="type-wrap" class="chips">
            <button class="chip" data-value="노와이어">노와이어</button>
            <button class="chip" data-value="브라렛">브라렛</button>
            <button class="chip" data-value="노라인">노라인</button>
            <button class="chip" data-value="볼륨패드">볼륨패드</button>
            <button class="chip" data-value="누브라">누브라</button>
            <button class="chip" data-value="푸쉬업">푸쉬업</button>
            <button class="chip" data-value="사각">사각</button>
            <button class="chip" data-value="와이어">와이어</button>
            <button class="chip" data-value="앞 후크">앞 후크</button>
            <!-- more -->
            <button class="chip more" data-value="니플패치">니플패치</button>
            <button class="chip more" data-value="볼륨업">볼륨업</button>
            <button class="chip more" data-value="홑겹">홑겹</button>
            <button class="chip more" data-value="하프컵">하프컵</button>
            <button class="chip more" data-value="삼각">삼각</button>
            <button class="chip more" data-value="사각">사각</button>
            <button class="chip more" data-value="드로즈">드로즈</button>
            <button class="chip more" data-value="하이웨스트">
              하이웨스트
            </button>
            <button class="chip more" data-value="오프숄더 브라">
              오프숄더 브라
            </button>
          </div>
          <button id="type-toggle" class="toggle">타입 전체보기</button>
        </section>

        <!-- 액션바 -->
        <div class="action-bar">
          <button id="btn-reset" class="action-btn reset"></button>
          <button id="btn-apply" class="action-btn apply"></button>
        </div>
      </article>
    </section>
    <div id="wear-modal-container"></div>
  </body>
</html>
