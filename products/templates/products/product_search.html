{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>EVE – 홈</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'products/css/search.css' %}" />
    <script src="{% static 'products/js/search.js' %}" defer></script>
  </head>
  <body>
    <!-- ============================== 본문 ============================== -->
    <div class="page-content">
      <div class="status-bar">
        <span id="clock">--:--</span>
        <div class="status-icons">
          <img
            src="{% static 'products/productimg/cellular.png' %}"
            class="icon"
            alt="cellular"
          />
          <img
            src="{% static 'products/productimg/wi-fi.png' %}"
            class="icon"
            alt="wifi"
          />
          <div class="battery"><div class="battery-level"></div></div>
        </div>
      </div>

      <h1 class="logo">EVE</h1>

      <form
        action="{% url 'product_search' %}"
        method="get"
        class="search-wrap"
      >
        <input
          type="text"
          name="q"
          value="{{ request.GET.q|default_if_none:'' }}"
          placeholder="원하는 상품을 검색하세요"
        />
        <button type="submit" class="search-icon" aria-label="search"></button>
      </form>

      <button class="btn-rec">추천받기</button>

      <div class="recommend-grid" id="rec-wrap">
        {% for product in products %}
        <div class="item-card" onclick="location.href='{% url 'product_detail' product.id %}?from=search&q={{ request.GET.q|urlencode }}'">
          <div class="item-img-wrap">
            <img src="{{ product.thumbnail_url }}" alt="{{ product.title }}" />
            <button
              type="button"
              class="heart {% if user in product.liked_users.all %}liked{% endif %}"
              data-product-id="{{ product.id }}"
              onclick="toggleLike(event)">
            </button>

            </form>
            <span class="wear"></span>
          </div>
          <div class="item-info">
            <div class="item-price">{{ product.price }}원</div>
            <div class="item-brand">{{ product.shop }}</div>
            <div class="item-desc">{{ product.title }}</div>
          </div>
        </div>
                  {% empty %}
        <p style="padding: 0 15px">추천 상품이 없습니다.</p>
        {% endfor %}
      </div>

      <nav class="bottom-nav">
        <a href="{% url 'home' %}" class="nav-item active" data-icon="home">
          <img
            src="{% static 'products/productimg/home_red.png' %}"
            alt="home"
            class="nav-icon"
          />
        </a>
        <a href="#" class="nav-item" data-icon="review">
          <img
            src="{% static 'products/productimg/review.png' %}"
            alt="review"
            class="nav-icon"
          />
        </a>
        <a href="#" class="nav-item" data-icon="user">
          <img
            src="{% static 'products/productimg/user.png' %}"
            alt="mypage"
            class="nav-icon"
          />
        </a>
      </nav>
    </div>

    <!-- ============================== 모달 ============================== -->
    <section id="rec-modal" class="rec-modal">
      <div class="modal-backdrop"></div>
      <article class="modal-sheet flex-col">
        <!-- 상태바 (모달용) -->
        <div class="status-bar">
          <span id="clock-modal">--:--</span>
          <div class="status-icons">
            <img
              src="{% static 'products/productimg/cellular.png' %}"
              class="icon"
              alt="cellular"
            />
            <img
              src="{% static 'products/productimg/wi-fi.png' %}"
              class="icon"
              alt="wifi"
            />
            <div class="battery"><div class="battery-level"></div></div>
          </div>
        </div>

        <header class="modal-header">
          <h2 class="modal-title">추천받기</h2>
          <button class="modal-close" aria-label="close">&times;</button>
        </header>

        <!-- 체형 버튼 -->
        <section class="block">
          <button id="btn-body" class="tag-btn outline">체형 불러오기</button>
          <div id="body-info" class="body-info-box"></div>
        </section>

        <!-- 가격 -->
        <section id="price-sec" class="block">
          <h3 class="block-title">가격</h3>
          <div class="price-inputs">
            <div class="price-field">
              <input id="price-min" placeholder="0" /><span class="unit"
                >원</span
              >
            </div>
            <span class="dash">-</span>
            <div class="price-field">
              <input id="price-max" placeholder="500,000" /><span class="unit"
                >원</span
              >
            </div>
          </div>
          <div id="price-slider">
            <div class="track"></div>
            <div id="handle-min" class="handle"></div>
            <div id="handle-max" class="handle"></div>
          </div>
        </section>

        <!-- 색상 -->
        <section id="color-sec" class="filter block">
          <h3 class="block-title">색상</h3>
          <div id="color-wrap" class="chips">
            <!-- 기본 6 -->
            <button class="chip" data-color="black">
              <span class="circle" style="background: #000"></span>블랙
            </button>
            <button class="chip" data-color="white">
              <span class="circle border"></span>화이트
            </button>
            <button class="chip" data-color="brown">
              <span class="circle" style="background: #7a5c4a"></span>브라운
            </button>
            <button class="chip" data-color="gray">
              <span class="circle" style="background: #b3b3b3"></span>그레이
            </button>
            <button class="chip" data-color="beige">
              <span class="circle" style="background: #f3e0c9"></span>베이지
            </button>
            <button class="chip" data-color="khaki">
              <span class="circle" style="background: #40625c"></span>카키
            </button>
            <!-- 추가 색상 (more) -->
            <button class="chip more" data-color="light pink">
              <span class="circle" style="background: #fadce5"></span>라이트핑크
            </button>
            <button class="chip more" data-color="dpink">
              <span class="circle" style="background: #d96a7b"></span>딥핑크
            </button>
            <button class="chip more" data-color="lilac">
              <span class="circle" style="background: #d8c7e3"></span>라일락
            </button>
            <button class="chip more" data-color="red">
              <span class="circle" style="background: #b22222"></span>레드
            </button>
            <button class="chip more" data-color="burgundy">
              <span class="circle" style="background: #6e1e2a"></span>버건디
            </button>
            <button class="chip more" data-color="coral">
              <span class="circle" style="background: #ff8f7e"></span>코랄
            </button>
            <button class="chip more" data-color="lyellow">
              <span class="circle" style="background: #fff7c2"></span>라이트
              옐로우
            </button>
            <button class="chip more" data-color="mint">
              <span class="circle" style="background: #d4f2db"></span>민트
            </button>
            <button class="chip more" data-color="olive">
              <span class="circle" style="background: #a2a77f"></span>올리브
            </button>
            <button class="chip more" data-color="lblue">
              <span class="circle" style="background: #bfd9ff"></span>라이트
              블루
            </button>
            <button class="chip more" data-color="navy">
              <span class="circle" style="background: #2c3e50"></span>네이비
            </button>
            <button class="chip more" data-color="charcoal">
              <span class="circle" style="background: #444"></span>차콜
            </button>
            <button class="chip more" data-color="ivory">
              <span class="circle" style="background: #f8f4ea"></span>아이보리
            </button>
            <button class="chip more" data-color="cbluegreen">
              <span class="circle" style="background: #3d6b6b"></span>블루그린
            </button>
            <button class="chip more" data-color="etc">
              <span
                class="circle"
                style="background: #fff; border: 1px solid #ccc"
              ></span
              >기타
            </button>
          </div>
          <button id="color-toggle" class="toggle">색상 전체보기</button>
        </section>

        <!-- 소재 -->
        <section id="mat-sec" class="filter block">
          <h3 class="block-title">소재</h3>
          <div id="mat-wrap" class="chips">
            <button class="chip">모달</button><button class="chip">면</button
            ><button class="chip">비스코스</button>
            <button class="chip">폴리에스테르</button
            ><button class="chip">텐셀</button
            ><button class="chip">합성섬유</button>
            <button class="chip">오가닉 코튼</button>
            <!-- more -->
            <button class="chip more">무봉제 가공</button
            ><button class="chip more">레이온</button
            ><button class="chip more">스판덱스</button>
            <button class="chip more">실크</button
            ><button class="chip more">폴리우레탄</button
            ><button class="chip more">나일론</button>
            <button class="chip more">파워넷</button
            ><button class="chip more">마이크로 화이버</button
            ><button class="chip more">기타</button>
          </div>
          <button id="mat-toggle" class="toggle">소재 전체보기</button>
        </section>

        <!-- 타입 -->
        <section id="type-sec" class="filter block">
          <h3 class="block-title">타입</h3>
          <div id="type-wrap" class="chips">
            <button class="chip">노와이어</button
            ><button class="chip">브라렛</button
            ><button class="chip">노라인</button>
            <button class="chip">볼륨패드</button
            ><button class="chip">누브라</button
            ><button class="chip">푸쉬업</button>
            <button class="chip">사각</button
            ><button class="chip">와이어</button
            ><button class="chip">앞 후크</button>
            <!-- more -->
            <button class="chip more">니플패치</button
            ><button class="chip more">볼륨업</button
            ><button class="chip more">홑겹</button>
            <button class="chip more">하프컵</button
            ><button class="chip more">삼각</button
            ><button class="chip more">사각</button>
            <button class="chip more">드로즈</button
            ><button class="chip more">하이웨스트</button
            ><button class="chip more">오프숄더 브라</button>
          </div>
          <button id="type-toggle" class="toggle">타입 전체보기</button>
        </section>

        <!-- 액션바 -->
        <div class="action-bar">
          <button id="btn-reset" class="action-btn reset"></button>
          <button id="btn-apply" class="action-btn apply"></button>
        </div>
      </article>
    </section>
    <div id="wear-modal-container"></div>
  </body>
</html>
