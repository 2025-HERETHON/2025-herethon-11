<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>착용 옵션 선택</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Prata&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../static/products/css/modal.css" />
    <script src="../../static/products/js/modal.js" defer></script>
  </head>

  <body>
    <!-- 휴대폰 뷰포트 -->
    <div id="phone">
      <form
        method="post"
        action="{% url 'toggle_wear' product.id %}"
        class="wear-sheet"
      >
        {% csrf_token %}
        <button type="button" class="wear-close" onclick="window.close?.()">
          &times;
        </button>
        <h3 class="wear-title">착용 옵션 선택</h3>

        <div class="wear-selects">
          <!-- 컬러 -->
          <label class="select-wrap">
            <span class="select-label">컬러 선택하기</span>
            <select size="3" id="wear-color" name="color" class="select-box">
              {% for color in colors %}
              <option value="{{ color }}">{{ color }}</option>
              {% endfor %}
            </select>
          </label>

          <!-- 사이즈 -->
          <label class="select-wrap">
            <span class="select-label">사이즈 선택하기</span>
            <select size="3" id="wear-size" name="size" class="select-box">
              {% for size in sizes %}
              <option value="{{ size }}">{{ size }}</option>
              {% endfor %}
            </select>
          </label>
        </div>

        <button type="submit" class="wear-apply">적용하기</button>
      </form>
      <div class="option-modal" id="optionModal">
        <div class="option-modal-content">옵션을 선택해주세요.</div>
      </div>
    </div>
  </body>
</html>
